id: "preprocessing_remove_wiki_loves_earth_banner"
title: "Preprocessing Remove Wiki Loves Earth Banner"
description: "Removes a Wiki Loves Earth or Wikidata banner link from the converted Markdown."
config:
    crawl:
        parser: crawl4ai
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_jump_to_content: false
            remove_wikipedia_featured_badge: false
            remove_wikipedia_edit_links: false
            remove_wikipedia_subtitle: false
            remove_wiki_loves_earth_banner: true
            remove_reference_sections: false
            remove_cite_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
