id: "preprocessing_remove_sections"
title: "Preprocessing Remove Reference Sections"
description: "Removes a configured section and everything after it."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://example.test/references
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: false
            remove_blocks: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            remove_sections:
                - References
