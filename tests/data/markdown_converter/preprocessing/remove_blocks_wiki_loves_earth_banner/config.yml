id: "preprocessing_remove_blocks_wiki_loves_earth_banner"
title: "Preprocessing Remove Blocks Wiki Loves Earth Banner"
description: "Removes a Wiki Loves Earth or Wikidata banner block through remove_blocks."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: false
            remove_blocks:
                - "Wikipedia:Wiki_Loves_Earth_"
                - "Wikidata:Events/Coordinate_Me_"
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
