id: "preprocessing_linebreak"
title: "Preprocessing Linebreak"
description: "Converts a simple HTML document with linebreak normalization only."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://example.test/simple-linebreak
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: false
            remove_wiki_loves_earth_banner: false
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: true
            normalize_whitespace: false
            reference_headings: []
