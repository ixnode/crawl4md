id: "preprocessing_remove_jump_to_content"
title: "Preprocessing Remove Jump To Content"
description: "Removes a same-page jump-to-content link from the converted Markdown."
config:
    crawl:
        parser: crawl4ai
        parse_type: markdown
    url: https://example.test/remove-jump
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_jump_to_content: true
            remove_wikipedia_featured_badge: false
            remove_wikipedia_edit_links: false
            remove_wikipedia_subtitle: false
            remove_wiki_loves_earth_banner: false
            remove_reference_sections: false
            remove_html_comments: false
            normalize_tables: false
            normalize_whitespace: false
            reference_headings: []
