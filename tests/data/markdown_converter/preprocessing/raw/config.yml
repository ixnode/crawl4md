id: "preprocessing_raw"
title: "Preprocessing Raw"
description: "Converts a simple HTML document without preprocessing."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://example.test/simple-raw
    preprocessing:
        markdown:
            enabled: false
            ensure_h1: false
            remove_lines: false
            remove_blocks: false
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
