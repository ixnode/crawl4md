id: "preprocessing_remove_links_jump_to_content"
title: "Preprocessing Remove Links Jump To Content"
description: "Removes a same-page jump-to-content link through remove_links."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://example.test/remove-jump
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: false
            remove_blocks: false
            remove_sections: false
            remove_links: "anchor:#(?:[Bb]ody[Cc]ontent|content|content-start|main|main-content|maincontent)"
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
