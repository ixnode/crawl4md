id: "preprocessing_remove_wikipedia_subtitle"
title: "Preprocessing Remove Wikipedia Subtitle"
description: "Removes the German Wikipedia subtitle from the converted Markdown."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_jump_to_content: false
            remove_wikipedia_featured_badge: false
            remove_wikipedia_edit_links: false
            remove_wikipedia_subtitle: true
            remove_wiki_loves_earth_banner: false
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
