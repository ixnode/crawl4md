id: "preprocessing_remove_lines_wikipedia_subtitle"
title: "Preprocessing Remove Lines Wikipedia Subtitle"
description: "Removes the German Wikipedia subtitle through remove_lines."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: "aus Wikipedia, der freien Enzyklopädie"
            remove_blocks: false
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: false
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
