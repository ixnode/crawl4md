id: "preprocessing_all"
title: "Preprocessing All"
description: "Converts a simple HTML document with all preprocessing enabled."
config:
    crawl:
        parser: crawl4ai
        parse_type: markdown
    url: https://example.test/simple-all
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: true
            remove_jump_to_content: true
            remove_wikipedia_featured_badge: false
            remove_wikipedia_edit_links: false
            remove_wikipedia_subtitle: true
            remove_wiki_loves_earth_banner: true
            remove_reference_sections: true
            remove_html_comments: true
            normalize_tables: false
            normalize_whitespace: true
            reference_headings: []
