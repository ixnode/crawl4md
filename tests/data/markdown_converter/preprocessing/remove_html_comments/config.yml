id: "preprocessing_remove_html_comments"
title: "Preprocessing Remove HTML Comments"
description: "Removes HTML comments from the converted Markdown."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://example.test/comments
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: false
            remove_lines: false
            remove_wiki_loves_earth_banner: false
            remove_reference_sections: false
            remove_links: false
            remove_html_comments: true
            normalize_tables: false
            normalize_linebreak: false
            normalize_whitespace: false
            reference_headings: []
