id: "wikipedia_boeing_707"
title: "Wikipedia Boeing 707"
description: "Converts the German Wikipedia Boeing 707 page with kreuzberg-dev and all preprocessing enabled."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: true
            remove_jump_to_content: true
            remove_wikipedia_featured_badge: false
            remove_wikipedia_edit_links: false
            remove_wikipedia_subtitle: true
            remove_wiki_loves_earth_banner: true
            remove_reference_sections: true
            remove_links: false
            remove_html_comments: true
            normalize_tables: false
            normalize_linebreak: true
            normalize_whitespace: true
            reference_headings:
                - Einzelnachweise
                - Weblinks
                - Literatur
                - Quellen
                - References
                - External links
                - Bibliography
