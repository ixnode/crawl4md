id: "wikipedia_boeing_707"
title: "Wikipedia Boeing 707"
description: "Converts the German Wikipedia Boeing 707 page with kreuzberg-dev and all preprocessing enabled."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: true
            remove_lines: "aus Wikipedia, der freien Enzyklopädie"
            remove_blocks:
                - "Wikipedia:Wiki_Loves_Earth_"
                - "Wikidata:Events/Coordinate_Me_"
            remove_reference_sections: true
            remove_links: "anchor:#(?:[Bb]ody[Cc]ontent|content|content-start|main|main-content|maincontent)"
            remove_html_comments: true
            normalize_tables: false
            normalize_linebreak: true
            normalize_whitespace: true
            reference_headings:
                - Einzelnachweise
                - Weblinks
                - Literatur
                - Quellen
                - References
                - External links
                - Bibliography
