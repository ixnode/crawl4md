id: "wikipedia_boeing_707_full"
title: "Wikipedia Boeing 707 Full"
description: "Converts the whole German Wikipedia Boeing 707 page with profile wikipedia and all preprocessing enabled."
config:
    profile: wikipedia
    url: https://de.wikipedia.org/wiki/Boeing_707
    crawl:
        parser: kreuzberg-dev # crawl4ai | kreuzberg-dev
        parse_type: markdown # crawl4ai: markdown | markdown-fit, kreuzberg-dev: markdown
        content_selector: null
    normalization:
        enabled: true
        entities: true
        hidden_elements: true
        urls: true
        references: true
