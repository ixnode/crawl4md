id: "wikipedia_boeing_707_full"
title: "Wikipedia Boeing 707 Full"
description: "Converts the German Wikipedia Boeing 707 page with markdown and all preprocessing enabled."
config:
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: true
            remove_lines:
                - "[Aa]us Wikipedia, der freien Enzyklopädie"
                - "[Ff]rom Wikipedia, the free encyclopedia"
            remove_blocks:
                - "Wikipedia:Wiki_Loves_Earth_"
                - "Wikidata:Events/Coordinate_Me_"
            remove_links: "anchor:#(?:[Bb]ody[Cc]ontent|content|content-start|main|main-content|maincontent)"
            remove_html_comments: true
            normalize_tables: false
            normalize_linebreak: true
            normalize_whitespace: true
            remove_sections:
                - Einzelnachweise
                - Weblinks
                - Literatur
                - Quellen
                - References
                - External links
                - Bibliography
