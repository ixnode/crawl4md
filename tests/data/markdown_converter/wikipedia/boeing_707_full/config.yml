id: "wikipedia_boeing_707_full"
title: "Wikipedia Boeing 707 Full"
description: "Converts the German Wikipedia Boeing 707 page with markdown and all preprocessing enabled."
config:
    crawl:
        parser: crawl4ai
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            enabled: true
            ensure_h1: true
            remove_jump_to_content: true
            remove_wikipedia_subtitle: true
            remove_wiki_loves_earth_banner: true
            remove_reference_sections: true
            remove_html_comments: true
            normalize_whitespace: true
            reference_headings:
                - Einzelnachweise
                - Weblinks
                - Literatur
                - Quellen
                - References
                - External links
                - Bibliography
