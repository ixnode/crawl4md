id: "wikipedia_boeing_707_full"
title: "Wikipedia Boeing 707 Full"
description: "Converts the German Wikipedia Boeing 707 page with markdown and all preprocessing enabled."
config:
    profile: wikipedia
    crawl:
        parser: kreuzberg-dev
        parse_type: markdown
    url: https://de.wikipedia.org/wiki/Boeing_707
    preprocessing:
        markdown:
            remove_links: "anchor:#(?:[Bb]ody[Cc]ontent|content|content-start|main|main-content|maincontent)"
            normalize_tables: false
