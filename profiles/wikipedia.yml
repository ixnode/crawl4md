profile: "wikipedia"
description: "Wikipedia Profile"

crawl:
    parser: kreuzberg-dev # crawl4ai | kreuzberg-dev
    parse_type: markdown # crawl4ai: markdown | markdown-fit, kreuzberg-dev: markdown
    content_selector: ".mw-parser-output"

normalization:
    enabled: true
    entities: true
    hidden_elements: true
    urls: true
    references: true

preprocessing:
    markdown:
        enabled: true

        ensure_h1: true

        remove_lines:
            - "[Aa]us Wikipedia, der freien Enzyklopädie"
            - "[Ff]rom Wikipedia, the free encyclopedia"
            - "\\[\\*\\*\\]"
        remove_blocks:
            - "Wikipedia:Wiki_Loves_Earth_"
            - "Wikidata:Events/Coordinate_Me_"
        remove_sections:
            - Einzelnachweise
            - Weblinks
            - Literatur
            - Quellen
            - Siehe auch
            - See also
            - References
            - External links
            - Bibliography
            - Vergleichbare Typen
        remove_links:
            - "anchor:cite_note"
            - "anchor:Citation_needed"
            - "anchor:#(?:[Bb]ody[Cc]ontent|content|content-start|main|main-content|maincontent)"
            - "anchor:#[Vv]orlage_[Ll]esenswert"
            - "anchor:#[Vv]orlage_[Ee]xzellent"
            - "anchor:veaction=edit[^)]*section="
            - "anchor:action=edit[^)]*section="
            - "unwrap:*"

        remove_images: true
        remove_html_comments: true

        normalize_tables: true
        normalize_linebreak: true
        normalize_whitespace: true
